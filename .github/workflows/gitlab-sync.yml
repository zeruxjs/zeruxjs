name: Sync to GitLab

on:
  push:
    branches:
      - '**'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      # -------------------------------
      # 🔐 Setup SSH (for gitlab.com)
      # -------------------------------
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GITLAB_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan gitlab.com >> ~/.ssh/known_hosts

      # -------------------------------
      # 🚀 Push to MAIN GitLab (must succeed)
      # -------------------------------
      - name: Push ALL branches & tags to GitLab.com
        run: |
          git remote add gitlab git@gitlab.com:zeruxjs/zeruxjs.git || true
          git push --force --all gitlab
          git push --force --tags gitlab

      # -------------------------------
      # 🌐 Push to SELF-HOSTED GitLab (optional)
      # -------------------------------
      - name: Push to Self-hosted GitLab (optional)
        env:
          SELF_GITLAB_TOKEN: ${{ secrets.SELF_GITLAB_TOKEN }}
        run: |
          set +e  # ❗ allow failure

          git remote add selfgitlab https://oauth2:${SELF_GITLAB_TOKEN}@gitlab.shubkb.me/zeruxjs/zeruxjs.git || true

          git push --force --all selfgitlab
          git push --force --tags selfgitlab

          echo "Self-hosted push attempted (failure ignored)"